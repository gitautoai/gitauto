name: Check Database Size and Cleanup

on:
  schedule:
    # Run daily at 2 AM UTC to monitor database size
    - cron: "0 2 * * *"
  workflow_dispatch:

env:
  ENV: github-actions
  SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}
  SLACK_CHANNEL: C08PHH352S3
  SUPABASE_DB_PASSWORD_PRD: ${{ secrets.PROD_SUPABASE_DB_PASSWORD }}
  SUPABASE_URL: ${{ secrets.PROD_SUPABASE_URL }}
  SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.PROD_SUPABASE_SERVICE_ROLE_KEY }}

jobs:
  check-and-cleanup:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install uv
        uses: astral-sh/setup-uv@v6

      - name: Install dependencies
        run: uv sync --frozen

      - name: Install PostgreSQL client
        run: |
          sudo apt-get update
          sudo apt-get install -y postgresql-client bc

      - name: Cleanup llm_requests table
        run: |
          THRESHOLD_MB=100
          TABLE_NAME=llm_requests

          chmod +x .github/scripts/check_table_size.sh
          chmod +x .github/scripts/vacuum_table.sh

          SIZE_MB=$(.github/scripts/check_table_size.sh "$TABLE_NAME")
          echo "Current $TABLE_NAME table size: $SIZE_MB MB"

          if [ $(echo "$SIZE_MB > $THRESHOLD_MB" | bc -l) -eq 1 ]; then
            echo "⚠️  Size exceeds threshold ($THRESHOLD_MB MB). Starting cleanup..."

            SIZE_BEFORE=$SIZE_MB

            echo "Clearing old content via Python..."
            python3 << 'EOF'
          from services.supabase.llm_requests.clear_old_content import clear_old_content
          result = clear_old_content(retention_days=14)
          if result is None:
              print("❌ Failed to clear old content (check logs for details)")
              exit(1)
          print(f"✓ Cleared content from {result} records older than 14 days")
          EOF

            .github/scripts/vacuum_table.sh "$TABLE_NAME"

            SIZE_AFTER=$(.github/scripts/check_table_size.sh "$TABLE_NAME")
            FREED=$(echo "$SIZE_BEFORE - $SIZE_AFTER" | bc)
            echo "✓ New size: $SIZE_AFTER MB (freed $FREED MB)"

            if [ $(echo "$SIZE_AFTER > $THRESHOLD_MB" | bc -l) -eq 1 ]; then
              echo "❌ WARNING: $TABLE_NAME still ${SIZE_AFTER} MB after cleanup (threshold: $THRESHOLD_MB MB)"
              curl -s -X POST \
                -H "Authorization: Bearer $SLACK_BOT_TOKEN" \
                -H "Content-Type: application/json" \
                -d "{\"channel\":\"$SLACK_CHANNEL\",\"text\":\"<!channel> DB cleanup: $TABLE_NAME still ${SIZE_AFTER} MB after cleanup (threshold: ${THRESHOLD_MB} MB, freed: ${FREED} MB)\"}" \
                https://slack.com/api/chat.postMessage
            fi
          else
            echo "✓ Size is under threshold ($THRESHOLD_MB MB). No cleanup needed."
          fi

      - name: Cleanup usage table
        run: |
          THRESHOLD_MB=50
          TABLE_NAME=usage

          SIZE_MB=$(.github/scripts/check_table_size.sh "$TABLE_NAME")
          echo "Current $TABLE_NAME table size: $SIZE_MB MB"

          if [ $(echo "$SIZE_MB > $THRESHOLD_MB" | bc -l) -eq 1 ]; then
            echo "⚠️  Size exceeds threshold ($THRESHOLD_MB MB). Starting cleanup..."

            SIZE_BEFORE=$SIZE_MB

            echo "Clearing old error logs via Python..."
            python3 << 'EOF'
          from services.supabase.usage.clear_old_error_logs import clear_old_error_logs
          result = clear_old_error_logs(retention_days=14)
          if result is None:
              print("❌ Failed to clear old error logs (check logs for details)")
              exit(1)
          print(f"✓ Cleared error logs from {result} records older than 14 days")
          EOF

            .github/scripts/vacuum_table.sh "$TABLE_NAME"

            SIZE_AFTER=$(.github/scripts/check_table_size.sh "$TABLE_NAME")
            FREED=$(echo "$SIZE_BEFORE - $SIZE_AFTER" | bc)
            echo "✓ New size: $SIZE_AFTER MB (freed $FREED MB)"

            if [ $(echo "$SIZE_AFTER > $THRESHOLD_MB" | bc -l) -eq 1 ]; then
              echo "❌ WARNING: $TABLE_NAME still ${SIZE_AFTER} MB after cleanup (threshold: $THRESHOLD_MB MB)"
              curl -s -X POST \
                -H "Authorization: Bearer $SLACK_BOT_TOKEN" \
                -H "Content-Type: application/json" \
                -d "{\"channel\":\"$SLACK_CHANNEL\",\"text\":\"<!channel> DB cleanup: $TABLE_NAME still ${SIZE_AFTER} MB after cleanup (threshold: ${THRESHOLD_MB} MB, freed: ${FREED} MB)\"}" \
                https://slack.com/api/chat.postMessage
            fi
          else
            echo "✓ Size is under threshold ($THRESHOLD_MB MB). No cleanup needed."
          fi

      - name: Notify Slack on failure
        if: failure()
        run: |
          curl -s -X POST \
            -H "Authorization: Bearer $SLACK_BOT_TOKEN" \
            -H "Content-Type: application/json" \
            -d "{\"channel\":\"$SLACK_CHANNEL\",\"text\":\"<!channel> Database cleanup workflow failed! Check workflow logs.\"}" \
            https://slack.com/api/chat.postMessage
