name: Post SNS

on:
  pull_request:
    types: [closed]
    branches:
      - main

permissions:
  pull-requests: read
  contents: read

env:
  SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}

jobs:
  check-python-changes:
    if: github.event.pull_request.merged == true
    runs-on: ubuntu-latest
    outputs:
      has_python_changes: ${{ steps.check.outputs.has_python_changes }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - id: check
        run: |
          if git diff --name-only --diff-filter=AM ${{ github.event.pull_request.base.sha }} ${{ github.event.pull_request.head.sha }} | grep -q '\.py$'; then
            echo "has_python_changes=true" >> $GITHUB_OUTPUT
          else
            echo "has_python_changes=false" >> $GITHUB_OUTPUT
          fi

  post-x:
    needs: check-python-changes
    if: needs.check-python-changes.outputs.has_python_changes == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: "24"

      # https://github.com/plhery/node-twitter-api-v2
      - name: Install dependencies
        run: npm install twitter-api-v2

      # https://github.com/actions/github-script
      - name: Post to X
        uses: actions/github-script@v8
        with:
          script: |
            const postX = require('.github/scripts/post-x.js');
            await postX({ context });
        env:
          X_OAUTH1_CONSUMER_KEY_GITAUTO: ${{ secrets.X_OAUTH1_CONSUMER_KEY_GITAUTO }}
          X_OAUTH1_CONSUMER_KEY_SECRET_GITAUTO: ${{ secrets.X_OAUTH1_CONSUMER_KEY_SECRET_GITAUTO }}
          X_OAUTH1_ACCESS_TOKEN_GITAUTO: ${{ secrets.X_OAUTH1_ACCESS_TOKEN_GITAUTO }}
          X_OAUTH1_ACCESS_TOKEN_SECRET_GITAUTO: ${{ secrets.X_OAUTH1_ACCESS_TOKEN_SECRET_GITAUTO }}
          X_OAUTH1_CONSUMER_KEY_WES: ${{ secrets.X_OAUTH1_CONSUMER_KEY_WES }}
          X_OAUTH1_CONSUMER_KEY_SECRET_WES: ${{ secrets.X_OAUTH1_CONSUMER_KEY_SECRET_WES }}
          X_OAUTH1_ACCESS_TOKEN_WES: ${{ secrets.X_OAUTH1_ACCESS_TOKEN_WES }}
          X_OAUTH1_ACCESS_TOKEN_SECRET_WES: ${{ secrets.X_OAUTH1_ACCESS_TOKEN_SECRET_WES }}

  post-linkedin:
    needs: check-python-changes
    if: needs.check-python-changes.outputs.has_python_changes == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: "24"

      # https://github.com/linkedin-developers/linkedin-api-js-client#linkedin-api-javascript-client
      - name: Install dependencies
        run: npm install linkedin-api-client

      - name: Post to LinkedIn
        uses: actions/github-script@v8
        continue-on-error: true
        with:
          script: |
            const postLinkedIn = require('.github/scripts/post-linkedin.js');
            await postLinkedIn({ context });
        env:
          LINKEDIN_ACCESS_TOKEN: ${{ secrets.LINKEDIN_ACCESS_TOKEN }}

  post-hackernews:
    needs: check-python-changes
    if: needs.check-python-changes.outputs.has_python_changes == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: "24"

      - name: Install dependencies
        run: npm install playwright

      - name: Install Chromium
        run: npx playwright install chromium

      - name: Post to Hacker News
        uses: actions/github-script@v8
        continue-on-error: true
        with:
          script: |
            const postHackerNews = require('.github/scripts/post-hackernews.js');
            await postHackerNews({ context });
        env:
          HN_USERNAME: ${{ secrets.HN_USERNAME }}
          HN_PASSWORD: ${{ secrets.HN_PASSWORD }}
