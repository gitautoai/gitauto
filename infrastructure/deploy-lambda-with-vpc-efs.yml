AWSTemplateFormatVersion: '2010-09-09'
Description: 'Lambda function with IAM role for GitAuto'

# =============================================================================
# Deployed via: .github/workflows/deployment.yml
# Stack name: gitauto-lambda-with-vpc-efs
# Depends on: gitauto-vpc-nat-efs (exports VPC, EFS, etc.)
#
# NOTE: Can't rename stack. Would need to rename Lambda too, but that breaks
# Function URL (used by GitHub App webhook, website, 88+ EventBridge schedules).
# =============================================================================

Parameters:
  # NOTE: Keeping 'pr-agent-prod' name because renaming would change Function URL,
  # requiring updates to: GitHub App webhook, 88+ EventBridge schedules, website env.
  # Possible but tedious and pointless.
  LambdaFunctionName:
    Type: String
    Description: Name of the Lambda function
    Default: pr-agent-prod
  ECRImageUri:
    Type: String
    Description: ECR image URI (e.g., 123456789.dkr.ecr.us-west-1.amazonaws.com/pr-agent-prod:abc123)

Resources:

  # =============================================================================
  # ECR Repository
  # =============================================================================
  ECRRepository:
    Type: AWS::ECR::Repository
    DeletionPolicy: Retain
    Properties:
      RepositoryName: !Ref LambdaFunctionName
      ImageScanningConfiguration:
        ScanOnPush: true
      LifecyclePolicy:
        LifecyclePolicyText: |
          {
            "rules": [
              {
                "rulePriority": 1,
                "description": "Keep last 10 images",
                "selection": {
                  "tagStatus": "any",
                  "countType": "imageCountMoreThan",
                  "countNumber": 10
                },
                "action": {
                  "type": "expire"
                }
              }
            ]
          }

  # =============================================================================
  # Lambda IAM Role
  # - Includes all permissions: CloudWatch, VPC, EFS, CodeBuild
  # =============================================================================
  LambdaExecutionRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub '${LambdaFunctionName}-role'
      Path: /service-role/
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      # AWS managed policy for VPC access (ENI management)
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSLambdaVPCAccessExecutionRole
      Policies:
        # CodeBuild - trigger package installations (npm install, pip install, etc.)
        - PolicyName: CodeBuildAccess
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action: codebuild:StartBuild
                Resource: !Sub 'arn:aws:codebuild:${AWS::Region}:${AWS::AccountId}:project/gitauto-package-install'
        # EFS - mount and write to shared filesystem
        - PolicyName: EFSAccess
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - elasticfilesystem:ClientMount
                  - elasticfilesystem:ClientWrite
                Resource: !ImportValue GitAutoEFSFileSystemArn
        # EventBridge Scheduler - manage scheduled invocations
        - PolicyName: SchedulerAccess
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - scheduler:DeleteSchedule
                  - scheduler:ListSchedules
                Resource: '*'

  # =============================================================================
  # CloudWatch Log Group
  # =============================================================================
  LogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: !Sub '/aws/lambda/${LambdaFunctionName}'
      RetentionInDays: 90

  # =============================================================================
  # Lambda Function
  # - Container image from ECR
  # - VPC-connected for EFS access
  # - 15 min timeout (max for Lambda)
  # =============================================================================
  LambdaFunction:
    Type: AWS::Lambda::Function
    DeletionPolicy: Retain
    DependsOn: LogGroup
    Properties:
      FunctionName: !Ref LambdaFunctionName
      PackageType: Image
      Code:
        ImageUri: !Ref ECRImageUri
      MemorySize: 512
      EphemeralStorage:
        Size: 2048
      Timeout: 900
      Role: !GetAtt LambdaExecutionRole.Arn
      VpcConfig:
        SecurityGroupIds:
          - !ImportValue GitAutoLambdaSecurityGroupId
        SubnetIds:
          - !ImportValue GitAutoPrivateSubnet1Id
          - !ImportValue GitAutoPrivateSubnet2Id
      FileSystemConfigs:
        - Arn: !ImportValue GitAutoEFSAccessPointArn
          LocalMountPath: /mnt/efs

  # =============================================================================
  # Lambda Function URL (public HTTPS endpoint for GitHub webhooks)
  # =============================================================================
  LambdaFunctionUrl:
    Type: AWS::Lambda::Url
    Properties:
      AuthType: NONE
      TargetFunctionArn: !GetAtt LambdaFunction.Arn
      InvokeMode: BUFFERED

  LambdaFunctionUrlPermission:
    Type: AWS::Lambda::Permission
    Properties:
      FunctionName: !Ref LambdaFunction
      Action: lambda:InvokeFunctionUrl
      Principal: '*'
      FunctionUrlAuthType: NONE

Outputs:
  LambdaFunctionArn:
    Description: Lambda function ARN
    Value: !GetAtt LambdaFunction.Arn
    Export:
      Name: !Sub '${LambdaFunctionName}-Arn'

  LambdaRoleArn:
    Description: Lambda IAM role ARN
    Value: !GetAtt LambdaExecutionRole.Arn
    Export:
      Name: !Sub '${LambdaFunctionName}-RoleArn'

  LambdaFunctionUrl:
    Description: Lambda function URL (GitHub webhook endpoint)
    Value: !GetAtt LambdaFunctionUrl.FunctionUrl
    Export:
      Name: !Sub '${LambdaFunctionName}-Url'

  ECRRepositoryUri:
    Description: ECR repository URI
    Value: !GetAtt ECRRepository.RepositoryUri
    Export:
      Name: !Sub '${LambdaFunctionName}-ECR'
