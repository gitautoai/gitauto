AWSTemplateFormatVersion: '2010-09-09'
Description: 'Lambda function with IAM role for GitAuto'

# =============================================================================
# Deployed via: .github/workflows/deployment.yml
# Stack name: gitauto-lambda-with-vpc-efs (can't rename without changing Function URL)
# Depends on: gitauto-vpc-nat-efs (exports S3 bucket)
# =============================================================================

Parameters:
  # NOTE: Keeping 'pr-agent-prod' name because renaming would change Function URL,
  # requiring updates to: GitHub App webhook, 88+ EventBridge schedules, website env.
  # Possible but tedious and pointless.
  LambdaFunctionName:
    Type: String
    Description: Name of the Lambda function
    Default: pr-agent-prod
  ECRImageUri:
    Type: String
    Description: ECR image URI (e.g., 123456789.dkr.ecr.us-west-1.amazonaws.com/pr-agent-prod:abc123)
  LambdaTimeoutSeconds:
    Type: Number
    Description: Lambda max execution time. Exposed to the function as the LAMBDA_TIMEOUT_SECONDS env var so Python code reads one source of truth.
    Default: 900

Resources:

  # =============================================================================
  # ECR Repository
  # =============================================================================
  ECRRepository:
    Type: AWS::ECR::Repository
    DeletionPolicy: Retain
    UpdateReplacePolicy: Retain
    Properties:
      RepositoryName: !Ref LambdaFunctionName
      ImageScanningConfiguration:
        ScanOnPush: true
      LifecyclePolicy:
        LifecyclePolicyText: |
          {
            "rules": [
              {
                "rulePriority": 1,
                "description": "Keep last 10 images",
                "selection": {
                  "tagStatus": "any",
                  "countType": "imageCountMoreThan",
                  "countNumber": 10
                },
                "action": {
                  "type": "expire"
                }
              }
            ]
          }

  # =============================================================================
  # Lambda IAM Role
  # - Includes all permissions: CloudWatch, S3, CodeBuild
  # =============================================================================
  LambdaExecutionRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub '${LambdaFunctionName}-role'
      Path: /service-role/
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole
      Policies:
        # CodeBuild - trigger package installations (npm install, pip install, etc.)
        - PolicyName: CodeBuildAccess
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action: codebuild:StartBuild
                Resource: !Sub 'arn:aws:codebuild:${AWS::Region}:${AWS::AccountId}:project/gitauto-package-install'
        # S3 - read/write dependency tarballs and manifests
        - PolicyName: S3DependencyCacheAccess
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - s3:GetObject
                  - s3:PutObject
                  - s3:DeleteObject
                  - s3:ListBucket
                Resource:
                  - !Join ['', ['arn:aws:s3:::', !ImportValue GitAutoDependencyCacheBucket]]
                  - !Join ['', ['arn:aws:s3:::', !ImportValue GitAutoDependencyCacheBucket, '/*']]
        # EventBridge Scheduler - manage scheduled invocations
        - PolicyName: SchedulerAccess
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - scheduler:DeleteSchedule
                  - scheduler:ListSchedules
                Resource: '*'
        # Lambda self-invocation - process_repositories fans out one async invoke per repo
        - PolicyName: LambdaSelfInvokeAccess
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action: lambda:InvokeFunction
                Resource: !Sub 'arn:aws:lambda:${AWS::Region}:${AWS::AccountId}:function:${LambdaFunctionName}'
        # SSM list — at cold start, run_subprocess queries describe_parameters under /gitauto/ to learn the names of GitAuto secrets, so it can scrub them from the env handed to customer subprocess children (Sentry AGENT-3KJ et al.). Only metadata; values are still injected at deploy time via {{resolve:ssm:...}} above.
        - PolicyName: SSMDescribeGitautoParameters
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action: ssm:DescribeParameters
                Resource: '*'

  # =============================================================================
  # CloudWatch Log Group
  # =============================================================================
  LogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: !Sub '/aws/lambda/${LambdaFunctionName}'
      RetentionInDays: 90

  # =============================================================================
  # Lambda Function
  # - Container image from ECR
  # - No VPC (calls AWS APIs directly, improves cold start by 1-3s)
  # - 15 min timeout (max for Lambda)
  # - Environment variables from AWS Parameter Store (/gitauto/*)
  # =============================================================================
  LambdaFunction:
    Type: AWS::Lambda::Function
    DeletionPolicy: Retain
    UpdateReplacePolicy: Retain
    DependsOn: LogGroup
    Properties:
      FunctionName: !Ref LambdaFunctionName
      PackageType: Image
      Code:
        ImageUri: !Ref ECRImageUri
      # Python (~800 MB) + Node.js/Jest (~2 GB) + mongod (~500 MB) + OS (~100 MB)
      MemorySize: 4096
      EphemeralStorage:
        # 10240 MB is Lambda's max. Sentry AGENT-3KQ/AGENT-35R: D0LLi/SecLists (security wordlists, ~2GB checkout) hit "No space left on device" at 97% during git checkout because /tmp had only 2 GB. AWS bills ephemeral storage above 512 MB at $0.0000000308/GB-second; bumping from 2 GB to 10 GB adds ~$0.00001 per 60s invocation.
        Size: 10240
      Timeout: !Ref LambdaTimeoutSeconds
      Role: !GetAtt LambdaExecutionRole.Arn
      Environment:
        Variables:
          # When adding/removing env vars: register in SSM (`aws ssm put-parameter --name /gitauto/KEY --value VAL --type SecureString --overwrite`), update infrastructure/lambda-env-backup.json, and update .env.template
          # Lambda's default HOME (/home/sbx_user1051) doesn't exist, causing npm/git/etc to fail when they try to write to HOME
          HOME: '/tmp'
          # CFN Environment.Variables values must be strings; !Sub forces stringification of the Number parameter.
          LAMBDA_TIMEOUT_SECONDS: !Sub '${LambdaTimeoutSeconds}'
          ANTHROPIC_API_KEY: '{{resolve:ssm:/gitauto/ANTHROPIC_API_KEY}}'
          GOOGLE_AI_API_KEY: '{{resolve:ssm:/gitauto/GOOGLE_AI_API_KEY}}'
          ENV: '{{resolve:ssm:/gitauto/ENV}}'
          GH_APP_ID: '{{resolve:ssm:/gitauto/GH_APP_ID}}'
          GH_APP_NAME: '{{resolve:ssm:/gitauto/GH_APP_NAME}}'
          GH_APP_USER_ID: '{{resolve:ssm:/gitauto/GH_APP_USER_ID}}'
          GH_APP_USER_NAME: '{{resolve:ssm:/gitauto/GH_APP_USER_NAME}}'
          GH_PRIVATE_KEY: '{{resolve:ssm:/gitauto/GH_PRIVATE_KEY}}'
          GH_WEBHOOK_SECRET: '{{resolve:ssm:/gitauto/GH_WEBHOOK_SECRET}}'
          GITAUTO_API_KEY: '{{resolve:ssm:/gitauto/GITAUTO_API_KEY}}'
          GIT_CONFIG_GLOBAL: '/tmp/.gitconfig'
          GIT_PYTHON_REFRESH: '{{resolve:ssm:/gitauto/GIT_PYTHON_REFRESH}}'
          OPENAI_API_KEY: '{{resolve:ssm:/gitauto/OPENAI_API_KEY}}'
          OPENAI_ORG_ID: '{{resolve:ssm:/gitauto/OPENAI_ORG_ID}}'
          PRODUCT_ID: '{{resolve:ssm:/gitauto/PRODUCT_ID}}'
          RESEND_API_KEY: '{{resolve:ssm:/gitauto/RESEND_API_KEY}}'
          SENTRY_DSN: '{{resolve:ssm:/gitauto/SENTRY_DSN}}'
          SLACK_BOT_TOKEN: '{{resolve:ssm:/gitauto/SLACK_BOT_TOKEN}}'
          SLACK_WEBHOOK_URL_NOTIFICATIONS: '{{resolve:ssm:/gitauto/SLACK_WEBHOOK_URL_NOTIFICATIONS}}'
          STRIPE_API_KEY: '{{resolve:ssm:/gitauto/STRIPE_API_KEY}}'
          SUPABASE_SERVICE_ROLE_KEY: '{{resolve:ssm:/gitauto/SUPABASE_SERVICE_ROLE_KEY}}'
          S3_DEPENDENCY_BUCKET: !ImportValue GitAutoDependencyCacheBucket
          SUPABASE_URL: '{{resolve:ssm:/gitauto/SUPABASE_URL}}'

  # =============================================================================
  # Lambda Function URL (public HTTPS endpoint for GitHub webhooks)
  # =============================================================================
  LambdaFunctionUrl:
    Type: AWS::Lambda::Url
    Properties:
      AuthType: NONE
      TargetFunctionArn: !GetAtt LambdaFunction.Arn
      InvokeMode: BUFFERED

  LambdaFunctionUrlPermission:
    Type: AWS::Lambda::Permission
    Properties:
      FunctionName: !Ref LambdaFunction
      Action: lambda:InvokeFunctionUrl
      Principal: '*'
      FunctionUrlAuthType: NONE

Outputs:
  LambdaFunctionArn:
    Description: Lambda function ARN
    Value: !GetAtt LambdaFunction.Arn
    Export:
      Name: !Sub '${LambdaFunctionName}-Arn'

  LambdaRoleArn:
    Description: Lambda IAM role ARN
    Value: !GetAtt LambdaExecutionRole.Arn
    Export:
      Name: !Sub '${LambdaFunctionName}-RoleArn'

  LambdaFunctionUrl:
    Description: Lambda function URL (GitHub webhook endpoint)
    Value: !GetAtt LambdaFunctionUrl.FunctionUrl
    Export:
      Name: !Sub '${LambdaFunctionName}-Url'

  ECRRepositoryUri:
    Description: ECR repository URI
    Value: !GetAtt ECRRepository.RepositoryUri
    Export:
      Name: !Sub '${LambdaFunctionName}-ECR'
