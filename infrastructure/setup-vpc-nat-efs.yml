AWSTemplateFormatVersion: '2010-09-09'
Description: 'VPC + NAT Instance (~$4/mo) + EFS + CodeBuild for GitAuto'

# =============================================================================
# Deployed via: .github/workflows/deployment.yml
# Stack name: gitauto-vpc-nat-efs
#
# NOTE: Can't rename stack. Would need to rename all resources too, but that
# breaks references from Lambda stack (VPC, subnets, EFS, security groups).
# =============================================================================
Resources:

  # =============================================================================
  # VPC (Virtual Private Cloud)
  # =============================================================================
  VPC:
    Type: AWS::EC2::VPC
    Properties:
      CidrBlock: 10.0.0.0/16
      EnableDnsHostnames: true
      EnableDnsSupport: true
      Tags:
        - Key: Name
          Value: gitauto-vpc

  # =============================================================================
  # Internet Gateway - allows public subnet to reach internet
  # =============================================================================
  InternetGateway:
    Type: AWS::EC2::InternetGateway
    Properties:
      Tags:
        - Key: Name
          Value: gitauto-igw

  AttachGateway:
    Type: AWS::EC2::VPCGatewayAttachment
    Properties:
      VpcId: !Ref VPC
      InternetGatewayId: !Ref InternetGateway

  # =============================================================================
  # Subnets - isolated network segments within VPC, each in one AZ (Availability Zone)
  # - 1 public subnet: NAT Instance in AZ-a only (single point of failure, but ~$4/mo vs ~$8/mo for 2)
  # - 2 private subnets: Lambda + EFS in both AZs (EFS HA works, but internet depends on NAT in AZ-a)
  # us-west-1 AZs verified: aws ec2 describe-availability-zones --region us-west-1 --query 'AvailabilityZones[*].ZoneName'
  # =============================================================================

  PublicSubnet:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref VPC
      CidrBlock: 10.0.1.0/24
      AvailabilityZone: us-west-1a
      MapPublicIpOnLaunch: true
      Tags:
        - Key: Name
          Value: gitauto-public-1a

  # Private subnets (for Lambda + EFS)
  PrivateSubnet1:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref VPC
      CidrBlock: 10.0.11.0/24
      AvailabilityZone: us-west-1a
      Tags:
        - Key: Name
          Value: gitauto-private-1a

  PrivateSubnet2:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref VPC
      CidrBlock: 10.0.12.0/24
      AvailabilityZone: us-west-1c
      Tags:
        - Key: Name
          Value: gitauto-private-1c

  # =============================================================================
  # Route Tables - rules that determine where network traffic is directed
  # =============================================================================

  # Public route table - routes to Internet Gateway
  PublicRouteTable:
    Type: AWS::EC2::RouteTable
    Properties:
      VpcId: !Ref VPC
      Tags:
        - Key: Name
          Value: gitauto-public-rt

  PublicRoute:
    Type: AWS::EC2::Route
    DependsOn: AttachGateway
    Properties:
      RouteTableId: !Ref PublicRouteTable
      DestinationCidrBlock: 0.0.0.0/0
      GatewayId: !Ref InternetGateway

  PublicSubnetRouteTableAssociation:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      SubnetId: !Ref PublicSubnet
      RouteTableId: !Ref PublicRouteTable

  # Private route table - routes to NAT Instance
  PrivateRouteTable:
    Type: AWS::EC2::RouteTable
    Properties:
      VpcId: !Ref VPC
      Tags:
        - Key: Name
          Value: gitauto-private-rt

  PrivateRoute:
    Type: AWS::EC2::Route
    Properties:
      RouteTableId: !Ref PrivateRouteTable
      DestinationCidrBlock: 0.0.0.0/0
      InstanceId: !Ref NATInstance

  PrivateSubnet1RouteTableAssociation:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      SubnetId: !Ref PrivateSubnet1
      RouteTableId: !Ref PrivateRouteTable

  PrivateSubnet2RouteTableAssociation:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      SubnetId: !Ref PrivateSubnet2
      RouteTableId: !Ref PrivateRouteTable

  # =============================================================================
  # NAT Instance (~$4/mo vs NAT Gateway ~$64/mo)
  # =============================================================================

  NATSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: Security group for NAT Instance
      VpcId: !Ref VPC
      SecurityGroupIngress:
        - IpProtocol: -1 # All traffic from private subnets
          CidrIp: 10.0.11.0/24
        - IpProtocol: -1
          CidrIp: 10.0.12.0/24
        - IpProtocol: tcp # SSH access for troubleshooting
          FromPort: 22
          ToPort: 22
          CidrIp: 0.0.0.0/0 # From anywhere (use various WiFis, private key is security)
      SecurityGroupEgress:
        - IpProtocol: -1 # All outbound traffic
          CidrIp: 0.0.0.0/0
      Tags:
        - Key: Name
          Value: gitauto-nat-sg

  # Using Amazon Linux 2023 AMI with NAT configuration
  # https://docs.aws.amazon.com/vpc/latest/userguide/VPC_NAT_Instance.html
  # NAT instance routes traffic - package installs run on CodeBuild
  # EFS mounted for debugging access via SSH
  NATInstance:
    Type: AWS::EC2::Instance
    Properties:
      InstanceType: t3.nano # ~$4/mo, sufficient for routing traffic only
      ImageId: '{{resolve:ssm:/aws/service/ami-amazon-linux-latest/al2023-ami-kernel-default-x86_64}}'
      KeyName: gitauto # Private key: infrastructure/nat-instance-ssh-private-key.pem
      SubnetId: !Ref PublicSubnet
      SecurityGroupIds:
        - !Ref NATSecurityGroup
      SourceDestCheck: false # Required for NAT
      UserData:
        Fn::Base64: !Sub |
          #!/bin/bash
          set -e

          # Enable IP forwarding
          echo "net.ipv4.ip_forward = 1" >> /etc/sysctl.conf
          sysctl -p

          # Enable NAT - detect primary interface dynamically
          IFACE=$(ip route | grep default | awk '{print $5}')
          if [ -z "$IFACE" ]; then
            echo "ERROR: Could not detect network interface" >> /var/log/nat-setup.log
            exit 1
          fi
          echo "Using interface: $IFACE" >> /var/log/nat-setup.log
          yum install -y iptables-services
          systemctl enable iptables
          systemctl start iptables
          # Allow forwarding (must be before Amazon Linux 2023's default REJECT rule)
          iptables -I FORWARD 1 -m state --state ESTABLISHED,RELATED -j ACCEPT # Return traffic
          iptables -I FORWARD 2 -s 10.0.11.0/24 -j ACCEPT # Private subnet 1
          iptables -I FORWARD 3 -s 10.0.12.0/24 -j ACCEPT # Private subnet 2
          iptables -t nat -A POSTROUTING -o $IFACE -j MASQUERADE
          service iptables save
          echo "NAT setup complete" >> /var/log/nat-setup.log

          # Mount EFS for debugging access via SSH
          yum install -y amazon-efs-utils
          mkdir -p /mnt/efs
          echo "${GitAutoEFS}:/ /mnt/efs efs defaults,_netdev 0 0" >> /etc/fstab
          mount -a
          echo "EFS mounted at /mnt/efs" >> /var/log/nat-setup.log
      Tags:
        - Key: Name
          Value: gitauto-nat-instance

  # Elastic IP for NAT Instance (consistent public IP)
  NATEIP:
    Type: AWS::EC2::EIP
    Properties:
      Domain: vpc
      Tags:
        - Key: Name
          Value: gitauto-nat-eip

  NATEIPAssociation:
    Type: AWS::EC2::EIPAssociation
    Properties:
      InstanceId: !Ref NATInstance
      AllocationId: !GetAtt NATEIP.AllocationId

  # =============================================================================
  # Lambda Security Group - only egress needed (Lambda initiates connections, doesn't receive)
  # =============================================================================
  LambdaSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: Security group for GitAuto Lambda
      VpcId: !Ref VPC
      SecurityGroupEgress:
        - IpProtocol: -1 # All outbound traffic
          CidrIp: 0.0.0.0/0
      Tags:
        - Key: Name
          Value: gitauto-lambda-sg

  # =============================================================================
  # EFS (Elastic File System) - persistent storage shared across Lambda invocations
  # Throughput modes:
  #   - bursting: Free but slow (~2.4 MB/s baseline for 49GB), rm/rsync takes 10+ min
  #   - elastic: ~$0.04/GB read, ~$0.06/GB write, scales automatically
  #   - provisioned: ~$6/MB/s/mo fixed cost
  # Jan 2026 usage: 6.9GB read + 14.1GB write = ~$1.13/mo with elastic
  # To check usage: aws cloudwatch get-metric-statistics --namespace AWS/EFS \
  #   --metric-name DataReadIOBytes --dimensions Name=FileSystemId,Value=fs-xxx \
  #   --start-time 2026-01-01T00:00:00Z --end-time 2026-02-01T00:00:00Z \
  #   --period 2678400 --statistics Sum --region us-west-1
  # =============================================================================
  GitAutoEFS:
    Type: AWS::EFS::FileSystem
    Properties:
      PerformanceMode: generalPurpose
      ThroughputMode: elastic # ~$0.04/GB read, ~$0.06/GB write (~$1/mo based on Jan usage)
      Encrypted: true
      BackupPolicy: # Disabled - data is regenerable (re-clone, re-install)
        Status: DISABLED
      # Move unused files from Standard ($0.30/GB/mo) to IA ($0.016/GB/mo)
      # https://docs.aws.amazon.com/AWSCloudFormation/latest/TemplateReference/aws-properties-efs-filesystem-lifecyclepolicy.html
      LifecyclePolicies:
        - TransitionToIA: AFTER_7_DAYS
      FileSystemTags:
        - Key: Name
          Value: gitauto-efs

  EFSSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: Security group for GitAuto EFS
      VpcId: !Ref VPC
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 2049
          ToPort: 2049
          SourceSecurityGroupId: !Ref LambdaSecurityGroup
        - IpProtocol: tcp
          FromPort: 2049
          ToPort: 2049
          SourceSecurityGroupId: !Ref CodeBuildSecurityGroup
        - IpProtocol: tcp
          FromPort: 2049
          ToPort: 2049
          SourceSecurityGroupId: !Ref NATSecurityGroup
      Tags:
        - Key: Name
          Value: gitauto-efs-sg

  # Mount Targets (one per private subnet)
  MountTarget1:
    Type: AWS::EFS::MountTarget
    Properties:
      FileSystemId: !Ref GitAutoEFS
      SubnetId: !Ref PrivateSubnet1
      SecurityGroups:
        - !Ref EFSSecurityGroup

  MountTarget2:
    Type: AWS::EFS::MountTarget
    Properties:
      FileSystemId: !Ref GitAutoEFS
      SubnetId: !Ref PrivateSubnet2
      SecurityGroups:
        - !Ref EFSSecurityGroup

  # =============================================================================
  # CodeBuild - AWS managed build service (serverless containers, not EC2)
  # - Lambda: 15 min timeout, 10GB storage, ~$0.0005/min (at 512MB) - 10x cheaper
  # - CodeBuild: 8 hour timeout, 70GB local SSD, ~$0.005/min - 10x more expensive
  # - Lambda is cheaper but times out on large yarn installs (can take 1+ hour)
  # - Container spins up, runs install, creates tarball on EFS, terminates
  #
  # Strategy: Store node_modules as tarball on EFS, Lambda extracts to /tmp
  # - Writing 150k files to EFS is slow (NFS metadata latency, ~1ms per file)
  # - Writing 1 tarball to EFS is fast (sequential write, throughput-limited)
  # - Lambda extracts tarball to local /tmp (fast, ~15-30s)
  #
  # Timing breakdown (Foxquilt/foxcom-forms with yarn, 2026-01-31, tarball approach):
  #   QUEUED: 1s
  #   PROVISIONING: 30s (spin up container)
  #   DOWNLOAD_SOURCE: 36s (mount EFS, install Node.js 24)
  #   BUILD: 175s
  #     - tar EFS to local SSD: 1s
  #     - yarn install: 103s
  #       - Resolving packages: ~2s
  #       - Fetching packages: ~35s
  #       - Linking dependencies: ~46s
  #       - Building fresh packages: ~20s
  #     - tar -czf node_modules.tar.gz to EFS: 67s
  #     - cleanup: 3s
  #   Total: ~4 min
  # =============================================================================
  CodeBuildSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: Security group for CodeBuild to access EFS
      VpcId: !Ref VPC
      SecurityGroupEgress:
        - IpProtocol: -1
          CidrIp: 0.0.0.0/0
      Tags:
        - Key: Name
          Value: gitauto-codebuild-sg

  CodeBuildServiceRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: gitauto-codebuild-role
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: codebuild.amazonaws.com
            Action: sts:AssumeRole
      Policies:
        - PolicyName: CodeBuildPolicy
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - logs:CreateLogGroup
                  - logs:CreateLogStream
                  - logs:PutLogEvents
                Resource: !Sub 'arn:aws:logs:${AWS::Region}:${AWS::AccountId}:log-group:/aws/codebuild/*'
              - Effect: Allow
                Action:
                  - ec2:CreateNetworkInterface
                  - ec2:DescribeNetworkInterfaces
                  - ec2:DeleteNetworkInterface
                  - ec2:DescribeSubnets
                  - ec2:DescribeSecurityGroups
                  - ec2:DescribeDhcpOptions
                  - ec2:DescribeVpcs
                  - ec2:CreateNetworkInterfacePermission
                Resource: '*'
              - Effect: Allow
                Action:
                  - elasticfilesystem:ClientMount
                  - elasticfilesystem:ClientWrite
                  - elasticfilesystem:DescribeMountTargets
                Resource: !GetAtt GitAutoEFS.Arn
      Tags:
        - Key: Name
          Value: gitauto-codebuild-role

  CodeBuildProject:
    Type: AWS::CodeBuild::Project
    Properties:
      Name: gitauto-package-install
      Description: Install npm/yarn packages on EFS
      ServiceRole: !GetAtt CodeBuildServiceRole.Arn
      Artifacts:
        Type: NO_ARTIFACTS
      Environment:
        Type: LINUX_CONTAINER
        ComputeType: BUILD_GENERAL1_SMALL # 3GB RAM, 2 vCPU, ~$0.005/min
        Image: aws/codebuild/amazonlinux2-x86_64-standard:5.0 # Has Node.js 24
        PrivilegedMode: true # Required for EFS mount
        EnvironmentVariables:
          - Name: EFS_DIR
            Value: /mnt/efs
          - Name: PKG_MANAGER
            Value: yarn
      Source:
        Type: NO_SOURCE
        BuildSpec: |
          version: 0.2
          phases:
            install:
              runtime-versions:
                nodejs: 24
            build:
              commands:
                - echo "Installing packages in $EFS_DIR using $PKG_MANAGER"
                - LOCAL_DIR="/tmp$EFS_DIR"
                - mkdir -p "$LOCAL_DIR"
                - |
                  if [ "$PKG_MANAGER" = "composer" ]; then
                    tar -cf - -C "$EFS_DIR" --exclude vendor --exclude 'vendor-bin/*/vendor' . | tar -xf - -C "$LOCAL_DIR"
                    cd "$LOCAL_DIR"
                    # Same PHP packages as Dockerfile - see comments there for details
                    yum install -y php-cli php-json php-mbstring php-xml php-pdo
                    curl -sS https://getcomposer.org/installer | php -- --install-dir=/usr/local/bin --filename=composer
                    composer install --no-interaction
                    # Install bamarni/composer-bin-plugin namespaces (e.g. vendor-bin/dev74) if present
                    for vb_dir in vendor-bin/*/; do
                      if [ -f "${vb_dir}composer.json" ]; then
                        composer install --no-interaction --working-dir="$vb_dir"
                      fi
                    done
                    rm -f "$EFS_DIR/vendor.tar.gz"
                    tar -czf "$EFS_DIR/vendor.tar.gz" -C "$LOCAL_DIR" vendor vendor-bin
                  else
                    tar -cf - -C "$EFS_DIR" --exclude node_modules . | tar -xf - -C "$LOCAL_DIR"
                    cd "$LOCAL_DIR"
                    if [ -n "$NPM_TOKEN" ]; then
                      export NPM_TOKEN="$NPM_TOKEN"
                    fi
                    $PKG_MANAGER install
                    # Pre-download MongoDB binary to EFS cache for MongoMemoryServer.
                    # Without this, MongoMemoryServer downloads ~100MB at test runtime,
                    # eating into Jest's 600s timeout on Lambda. By caching the binary on EFS
                    # during CodeBuild install, tests start instantly.
                    if node -e "require.resolve('mongodb-memory-server-core')" 2>/dev/null; then
                      echo "Pre-downloading MongoDB binary for MongoMemoryServer..."
                      export MONGOMS_DOWNLOAD_DIR="$EFS_DIR/.cache/mongodb-binaries"
                      node -e "
                        const pkg = require('./package.json');
                        const v = (pkg.config && pkg.config.mongodbMemoryServer && pkg.config.mongodbMemoryServer.version) || '';
                        if (v && parseInt(v.split('.')[0]) < 7) process.env.MONGOMS_DISTRO = 'ubuntu-22.04';
                        require('mongodb-memory-server-core').MongoBinary.getPath()
                          .then(p => console.log('MongoDB binary cached at:', p))
                          .catch(e => console.error('MongoDB download failed:', e.message));
                      " || true
                    fi
                    rm -f "$EFS_DIR/node_modules.tar.gz"
                    tar -czf "$EFS_DIR/node_modules.tar.gz" -C "$LOCAL_DIR" node_modules
                  fi
                - rm -rf "$LOCAL_DIR"
                - echo "Package install complete for $PKG_MANAGER in $EFS_DIR"
      TimeoutInMinutes: 60
      VpcConfig:
        VpcId: !Ref VPC
        Subnets:
          - !Ref PrivateSubnet1
        SecurityGroupIds:
          - !Ref CodeBuildSecurityGroup
      FileSystemLocations:
        - Type: EFS
          Location: !Sub '${GitAutoEFS}.efs.${AWS::Region}.amazonaws.com:/'
          MountPoint: /mnt/efs
          Identifier: efs_mount
          MountOptions: 'nfsvers=4.1,rsize=1048576,wsize=1048576,hard,timeo=600,retrans=2'
      LogsConfig:
        CloudWatchLogs:
          Status: ENABLED
          GroupName: /aws/codebuild/gitauto-package-install
      Tags:
        - Key: Name
          Value: gitauto-package-install

  # EFS Access Point for Lambda
  LambdaAccessPoint:
    Type: AWS::EFS::AccessPoint
    Properties:
      FileSystemId: !Ref GitAutoEFS
      PosixUser: # Lambda runs as UID 0 (root)
        Uid: '0'
        Gid: '0'
      RootDirectory:
        Path: /
        CreationInfo: # Must match PosixUser for write access
          OwnerUid: '0'
          OwnerGid: '0'
          Permissions: '755'
      AccessPointTags:
        - Key: Name
          Value: gitauto-lambda-access-point

# =============================================================================
# Outputs - values needed to configure Lambda
# =============================================================================
Outputs:
  VPCId:
    Description: VPC ID
    Value: !Ref VPC
    Export:
      Name: GitAutoVPCId

  PrivateSubnet1Id:
    Description: Private Subnet 1 ID (us-west-1a)
    Value: !Ref PrivateSubnet1
    Export:
      Name: GitAutoPrivateSubnet1Id

  PrivateSubnet2Id:
    Description: Private Subnet 2 ID (us-west-1c)
    Value: !Ref PrivateSubnet2
    Export:
      Name: GitAutoPrivateSubnet2Id

  LambdaSecurityGroupId:
    Description: Security Group ID for Lambda
    Value: !Ref LambdaSecurityGroup
    Export:
      Name: GitAutoLambdaSecurityGroupId

  EFSFileSystemId:
    Description: EFS File System ID
    Value: !Ref GitAutoEFS
    Export:
      Name: GitAutoEFSId

  EFSFileSystemArn:
    Description: EFS File System ARN for IAM policies
    Value: !GetAtt GitAutoEFS.Arn
    Export:
      Name: GitAutoEFSFileSystemArn

  EFSAccessPointArn:
    Description: EFS Access Point ARN (Amazon Resource Name) for Lambda
    Value: !GetAtt LambdaAccessPoint.Arn
    Export:
      Name: GitAutoEFSAccessPointArn

  NATInstanceId:
    Description: NAT Instance ID
    Value: !Ref NATInstance
    Export:
      Name: GitAutoNATInstanceId

  NATPublicIP:
    Description: NAT Instance Public IP
    Value: !Ref NATEIP
    Export:
      Name: GitAutoNATPublicIP

  CodeBuildProjectName:
    Description: CodeBuild project name for package installs
    Value: !Ref CodeBuildProject
    Export:
      Name: GitAutoCodeBuildProjectName
