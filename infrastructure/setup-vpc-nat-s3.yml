AWSTemplateFormatVersion: '2010-09-09'
Description: 'VPC + NAT Instance (~$4/mo) + S3 + CodeBuild for GitAuto'

# =============================================================================
# Deployed via: .github/workflows/deployment.yml
# Stack name: gitauto-vpc-nat-efs (can't rename without recreating all resources)
# File renamed from setup-vpc-nat-efs.yml after EFS removal
# =============================================================================
Resources:

  # =============================================================================
  # VPC (Virtual Private Cloud)
  # =============================================================================
  VPC:
    Type: AWS::EC2::VPC
    Properties:
      CidrBlock: 10.0.0.0/16
      EnableDnsHostnames: true
      EnableDnsSupport: true
      Tags:
        - Key: Name
          Value: gitauto-vpc

  # =============================================================================
  # Internet Gateway - allows public subnet to reach internet
  # =============================================================================
  InternetGateway:
    Type: AWS::EC2::InternetGateway
    Properties:
      Tags:
        - Key: Name
          Value: gitauto-igw

  AttachGateway:
    Type: AWS::EC2::VPCGatewayAttachment
    Properties:
      VpcId: !Ref VPC
      InternetGatewayId: !Ref InternetGateway

  # =============================================================================
  # Subnets - isolated network segments within VPC, each in one AZ (Availability Zone)
  # - 1 public subnet: NAT Instance in AZ-a only (single point of failure, but ~$4/mo vs ~$8/mo for 2)
  # - 2 private subnets: CodeBuild in both AZs (internet depends on NAT in AZ-a)
  # us-west-1 AZs verified: aws ec2 describe-availability-zones --region us-west-1 --query 'AvailabilityZones[*].ZoneName'
  # =============================================================================

  PublicSubnet:
    Type: AWS::EC2::Subnet
    Metadata:
      cfn-lint:
        config:
          ignore_checks: [W3010] # Intentional: us-west-1 only has 2 AZs (a, c)
    Properties:
      VpcId: !Ref VPC
      CidrBlock: 10.0.1.0/24
      AvailabilityZone: us-west-1a
      MapPublicIpOnLaunch: true
      Tags:
        - Key: Name
          Value: gitauto-public-1a

  # Private subnets (for CodeBuild — Lambda no longer needs VPC)
  PrivateSubnet1:
    Type: AWS::EC2::Subnet
    Metadata:
      cfn-lint:
        config:
          ignore_checks: [W3010] # Intentional: us-west-1 only has 2 AZs (a, c)
    Properties:
      VpcId: !Ref VPC
      CidrBlock: 10.0.11.0/24
      AvailabilityZone: us-west-1a
      Tags:
        - Key: Name
          Value: gitauto-private-1a

  PrivateSubnet2:
    Type: AWS::EC2::Subnet
    Metadata:
      cfn-lint:
        config:
          ignore_checks: [W3010] # Intentional: us-west-1 only has 2 AZs (a, c)
    Properties:
      VpcId: !Ref VPC
      CidrBlock: 10.0.12.0/24
      AvailabilityZone: us-west-1c
      Tags:
        - Key: Name
          Value: gitauto-private-1c

  # =============================================================================
  # Route Tables - rules that determine where network traffic is directed
  # =============================================================================

  # Public route table - routes to Internet Gateway
  PublicRouteTable:
    Type: AWS::EC2::RouteTable
    Properties:
      VpcId: !Ref VPC
      Tags:
        - Key: Name
          Value: gitauto-public-rt

  PublicRoute:
    Type: AWS::EC2::Route
    DependsOn: AttachGateway
    Properties:
      RouteTableId: !Ref PublicRouteTable
      DestinationCidrBlock: 0.0.0.0/0
      GatewayId: !Ref InternetGateway

  PublicSubnetRouteTableAssociation:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      SubnetId: !Ref PublicSubnet
      RouteTableId: !Ref PublicRouteTable

  # Private route table - routes to NAT Instance
  PrivateRouteTable:
    Type: AWS::EC2::RouteTable
    Properties:
      VpcId: !Ref VPC
      Tags:
        - Key: Name
          Value: gitauto-private-rt

  PrivateRoute:
    Type: AWS::EC2::Route
    Properties:
      RouteTableId: !Ref PrivateRouteTable
      DestinationCidrBlock: 0.0.0.0/0
      InstanceId: !Ref NATInstance

  PrivateSubnet1RouteTableAssociation:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      SubnetId: !Ref PrivateSubnet1
      RouteTableId: !Ref PrivateRouteTable

  PrivateSubnet2RouteTableAssociation:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      SubnetId: !Ref PrivateSubnet2
      RouteTableId: !Ref PrivateRouteTable

  # =============================================================================
  # NAT Instance (~$4/mo vs NAT Gateway ~$64/mo)
  # =============================================================================

  NATSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: Security group for NAT Instance
      VpcId: !Ref VPC
      SecurityGroupIngress:
        - IpProtocol: -1 # All traffic from private subnets
          CidrIp: 10.0.11.0/24
        - IpProtocol: -1
          CidrIp: 10.0.12.0/24
        - IpProtocol: tcp # SSH access for troubleshooting
          FromPort: 22
          ToPort: 22
          CidrIp: 0.0.0.0/0 # From anywhere (use various WiFis, private key is security)
      SecurityGroupEgress:
        - IpProtocol: -1 # All outbound traffic
          CidrIp: 0.0.0.0/0
      Tags:
        - Key: Name
          Value: gitauto-nat-sg

  # Using Amazon Linux 2023 AMI with NAT configuration
  # https://docs.aws.amazon.com/vpc/latest/userguide/VPC_NAT_Instance.html
  # NAT instance routes traffic - package installs run on CodeBuild
  NATInstance:
    Type: AWS::EC2::Instance
    Properties:
      InstanceType: t3.nano # ~$4/mo, sufficient for routing traffic only
      ImageId: '{{resolve:ssm:/aws/service/ami-amazon-linux-latest/al2023-ami-kernel-default-x86_64}}'
      KeyName: gitauto # Private key: infrastructure/nat-instance-ssh-private-key.pem
      SubnetId: !Ref PublicSubnet
      SecurityGroupIds:
        - !Ref NATSecurityGroup
      SourceDestCheck: false # Required for NAT
      UserData:
        Fn::Base64: |
          #!/bin/bash
          set -e

          # Enable IP forwarding
          echo "net.ipv4.ip_forward = 1" >> /etc/sysctl.conf
          sysctl -p

          # Enable NAT - detect primary interface dynamically
          IFACE=$(ip route | grep default | awk '{print $5}')
          if [ -z "$IFACE" ]; then
            echo "ERROR: Could not detect network interface" >> /var/log/nat-setup.log
            exit 1
          fi
          echo "Using interface: $IFACE" >> /var/log/nat-setup.log
          yum install -y iptables-services
          systemctl enable iptables
          systemctl start iptables
          # Allow forwarding (must be before Amazon Linux 2023's default REJECT rule)
          iptables -I FORWARD 1 -m state --state ESTABLISHED,RELATED -j ACCEPT # Return traffic
          iptables -I FORWARD 2 -s 10.0.11.0/24 -j ACCEPT # Private subnet 1
          iptables -I FORWARD 3 -s 10.0.12.0/24 -j ACCEPT # Private subnet 2
          iptables -t nat -A POSTROUTING -o $IFACE -j MASQUERADE
          service iptables save
          echo "NAT setup complete" >> /var/log/nat-setup.log
      Tags:
        - Key: Name
          Value: gitauto-nat-instance

  # Elastic IP for NAT Instance (consistent public IP)
  NATEIP:
    Type: AWS::EC2::EIP
    Properties:
      Domain: vpc
      Tags:
        - Key: Name
          Value: gitauto-nat-eip

  NATEIPAssociation:
    Type: AWS::EC2::EIPAssociation
    Properties:
      InstanceId: !Ref NATInstance
      AllocationId: !GetAtt NATEIP.AllocationId

  # =============================================================================
  # Lambda Security Group - only egress needed (Lambda initiates connections, doesn't receive)
  # =============================================================================
  LambdaSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: Security group for GitAuto Lambda
      VpcId: !Ref VPC
      SecurityGroupEgress:
        - IpProtocol: -1 # All outbound traffic
          CidrIp: 0.0.0.0/0
      Tags:
        - Key: Name
          Value: gitauto-lambda-sg

  # =============================================================================
  # S3 Bucket - dependency cache
  # Stores node_modules.tar.gz, vendor.tar.gz per repo, and etc.
  # Key structure: {owner}/{repo}/node_modules.tar.gz
  # Object metadata: x-amz-meta-manifest-hash (SHA256 of manifests)
  # =============================================================================
  DependencyCacheBucket:
    Type: AWS::S3::Bucket
    DeletionPolicy: Retain # Keep bucket if stack is deleted
    UpdateReplacePolicy: Retain
    Properties:
      BucketName: gitauto-dependency-cache
      BucketEncryption: # Encrypt at rest (free)
        ServerSideEncryptionConfiguration:
          - ServerSideEncryptionByDefault:
              SSEAlgorithm: AES256
      PublicAccessBlockConfiguration: # No public access
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true
      LifecycleConfiguration: # Auto-delete after 30 days
        Rules:
          - Id: ExpireOldTarballs
            Status: Enabled
            ExpirationInDays: 30

  # =============================================================================
  # CodeBuild - AWS managed build service (serverless containers, not EC2)
  # - Lambda: 15 min timeout, 10GB storage, ~$0.0005/min (at 512MB) - 10x cheaper
  # - CodeBuild: 8 hour timeout, 70GB local SSD, ~$0.005/min - 10x more expensive
  # - Lambda is cheaper but times out on large yarn installs (can take 1+ hour)
  # - Container spins up, runs install, uploads tarball to S3, terminates
  #
  # Strategy: Store node_modules as tarball on S3, Lambda downloads + extracts to /tmp
  # =============================================================================
  CodeBuildSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: Security group for CodeBuild to access EFS
      VpcId: !Ref VPC
      SecurityGroupEgress:
        - IpProtocol: -1
          CidrIp: 0.0.0.0/0
      Tags:
        - Key: Name
          Value: gitauto-codebuild-sg

  CodeBuildServiceRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: gitauto-codebuild-role
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: codebuild.amazonaws.com
            Action: sts:AssumeRole
      Policies:
        - PolicyName: CodeBuildPolicy
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - logs:CreateLogGroup
                  - logs:CreateLogStream
                  - logs:PutLogEvents
                Resource: !Sub 'arn:aws:logs:${AWS::Region}:${AWS::AccountId}:log-group:/aws/codebuild/*'
              - Effect: Allow
                Action:
                  - ec2:CreateNetworkInterface
                  - ec2:DescribeNetworkInterfaces
                  - ec2:DeleteNetworkInterface
                  - ec2:DescribeSubnets
                  - ec2:DescribeSecurityGroups
                  - ec2:DescribeDhcpOptions
                  - ec2:DescribeVpcs
                  - ec2:CreateNetworkInterfacePermission
                Resource: '*'
              - Effect: Allow
                Action:
                  - s3:GetObject
                  - s3:PutObject
                Resource: !Sub '${DependencyCacheBucket.Arn}/*'
      Tags:
        - Key: Name
          Value: gitauto-codebuild-role

  CodeBuildProject:
    Type: AWS::CodeBuild::Project
    Properties:
      Name: gitauto-package-install
      Description: Install npm/yarn/composer packages, upload tarball to S3
      ServiceRole: !GetAtt CodeBuildServiceRole.Arn
      Artifacts:
        Type: NO_ARTIFACTS
      Environment:
        Type: LINUX_CONTAINER
        ComputeType: BUILD_GENERAL1_SMALL # 3GB RAM, 2 vCPU, ~$0.005/min
        Image: aws/codebuild/amazonlinux2-x86_64-standard:5.0 # Has Node.js 24
        PrivilegedMode: true # TODO: Set to false after FileSystemLocations is removed from live state
        EnvironmentVariables:
          - Name: S3_BUCKET
            Value: !Ref DependencyCacheBucket
          - Name: S3_KEY_PREFIX
            Value: placeholder
          - Name: PKG_MANAGER
            Value: yarn
      Source:
        Type: NO_SOURCE
        BuildSpec: |
          version: 0.2
          phases:
            install:
              runtime-versions:
                nodejs: 24
            build:
              commands:
                - echo "Installing packages for $S3_KEY_PREFIX using $PKG_MANAGER"
                - LOCAL_DIR="/tmp/build"
                - mkdir -p "$LOCAL_DIR"
                - aws s3 cp "s3://$S3_BUCKET/$S3_KEY_PREFIX/manifests/" "$LOCAL_DIR/" --recursive
                - MANIFEST_HASH=$(cat "$LOCAL_DIR/.manifest-hash" 2>/dev/null || echo "unknown")
                - rm -f "$LOCAL_DIR/.manifest-hash"
                - |
                  if [ "$PKG_MANAGER" = "composer" ]; then
                    cd "$LOCAL_DIR"
                    yum install -y php-cli php-json php-mbstring php-xml php-pdo
                    curl -sS https://getcomposer.org/installer | php -- --install-dir=/usr/local/bin --filename=composer
                    composer install --no-interaction
                    for vb_dir in vendor-bin/*/; do
                      if [ -f "${vb_dir}composer.json" ]; then
                        composer install --no-interaction --working-dir="$vb_dir"
                      fi
                    done
                    tar -czf /tmp/vendor.tar.gz -C "$LOCAL_DIR" vendor vendor-bin
                    aws s3 cp /tmp/vendor.tar.gz "s3://$S3_BUCKET/$S3_KEY_PREFIX/vendor.tar.gz" \
                      --metadata "manifest-hash=$MANIFEST_HASH"
                  else
                    cd "$LOCAL_DIR"
                    if [ -n "$NPM_TOKEN" ]; then
                      export NPM_TOKEN="$NPM_TOKEN"
                    fi
                    $PKG_MANAGER install
                    # Pre-download MongoDB binary to S3 cache if repo uses MongoMemoryServer
                    MONGOD_SCRIPT="$CODEBUILD_SRC_DIR/download_mongod_binary.mjs"
                    if [ -f "$LOCAL_DIR/node_modules/mongodb-memory-server-core/package.json" ]; then
                      # Download mongod binary, upload to S3
                      MONGOMS_DOWNLOAD_DIR="/tmp/mongodb-binaries" node -e "
                        const { MongoBinaryDownload } = require('$LOCAL_DIR/node_modules/mongodb-memory-server-core/lib/util/MongoBinaryDownload');
                        new MongoBinaryDownload({}).download().catch(e => console.error(e));
                      " || true
                      if [ -d /tmp/mongodb-binaries ]; then
                        tar -czf /tmp/mongodb-binaries.tar.gz -C /tmp mongodb-binaries
                        aws s3 cp /tmp/mongodb-binaries.tar.gz "s3://$S3_BUCKET/$S3_KEY_PREFIX/mongodb-binaries.tar.gz"
                      fi
                    fi
                    tar -czf /tmp/node_modules.tar.gz -C "$LOCAL_DIR" node_modules
                    aws s3 cp /tmp/node_modules.tar.gz "s3://$S3_BUCKET/$S3_KEY_PREFIX/node_modules.tar.gz" \
                      --metadata "manifest-hash=$MANIFEST_HASH"
                  fi
                - rm -rf "$LOCAL_DIR"
                - echo "Package install complete for $PKG_MANAGER, uploaded to s3://$S3_BUCKET/$S3_KEY_PREFIX/"
      TimeoutInMinutes: 60
      VpcConfig:
        VpcId: !Ref VPC
        Subnets:
          - !Ref PrivateSubnet1
        SecurityGroupIds:
          - !Ref CodeBuildSecurityGroup
      LogsConfig:
        CloudWatchLogs:
          Status: ENABLED
          GroupName: /aws/codebuild/gitauto-package-install
      Tags:
        - Key: Name
          Value: gitauto-package-install

# =============================================================================
# Outputs - values needed to configure Lambda
# =============================================================================
Outputs:
  VPCId:
    Description: VPC ID
    Value: !Ref VPC
    Export:
      Name: GitAutoVPCId

  PrivateSubnet1Id:
    Description: Private Subnet 1 ID (us-west-1a)
    Value: !Ref PrivateSubnet1
    Export:
      Name: GitAutoPrivateSubnet1Id

  PrivateSubnet2Id:
    Description: Private Subnet 2 ID (us-west-1c)
    Value: !Ref PrivateSubnet2
    Export:
      Name: GitAutoPrivateSubnet2Id

  LambdaSecurityGroupId:
    Description: Security Group ID for Lambda
    Value: !Ref LambdaSecurityGroup
    Export:
      Name: GitAutoLambdaSecurityGroupId

  NATInstanceId:
    Description: NAT Instance ID
    Value: !Ref NATInstance
    Export:
      Name: GitAutoNATInstanceId

  NATPublicIP:
    Description: NAT Instance Public IP
    Value: !Ref NATEIP
    Export:
      Name: GitAutoNATPublicIP

  CodeBuildProjectName:
    Description: CodeBuild project name for package installs
    Value: !Ref CodeBuildProject
    Export:
      Name: GitAutoCodeBuildProjectName

  DependencyCacheBucketName:
    Description: S3 bucket for dependency tarballs
    Value: !Ref DependencyCacheBucket
    Export:
      Name: GitAutoDependencyCacheBucket
